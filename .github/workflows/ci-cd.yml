name: Fresh Farm Juba CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run Tests
      run: ./gradlew test

    - name: Build Docker Image
      if: github.ref == 'refs/heads/main'
      run: |
        docker build -t freshfarmjuba:${{ github.sha }} .
        docker tag freshfarmjuba:${{ github.sha }} freshfarmjuba:latest

    # Add deployment steps here (e.g., to EKS, GKE, or DigitalOcean)
