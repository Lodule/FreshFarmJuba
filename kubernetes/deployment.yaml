apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshfarmjuba
  labels:
    app: freshfarmjuba
spec:
  replicas: 2
  selector:
    matchLabels:
      app: freshfarmjuba
  template:
    metadata:
      labels:
        app: freshfarmjuba
    spec:
      containers:
      - name: freshfarmjuba
        image: freshfarmjuba:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: prod
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-service:5432/freshfarmjuba
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: password
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
