<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header}">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar}"></div>

<div class="container-fluid py-4 px-4">
    <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-2">
             <div class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden sticky-top" style="top: 100px;">
                <div class="card-header bg-success text-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-grid me-2"></i>Admin Menu</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/admin/dashboard}" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-house-door me-2"></i>Dashboard
                    </a>
                    <a th:href="@{/admin/products}" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-box-seam me-2"></i>Manage Products
                    </a>
                    <a th:href="@{/admin/orders}" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-cart-check me-2"></i>Orders
                    </a>
                    <a th:href="@{/admin/messages}" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-chat-dots me-2"></i>Messages
                    </a>
                    <a th:href="@{/admin/reports}" class="list-group-item list-group-item-action active bg-success border-success py-3">
                        <i class="bi bi-graph-up me-2"></i>Reports
                    </a>
                    <a th:href="@{/admin/settings}" class="list-group-item list-group-item-action py-3">
                        <i class="bi bi-gear me-2"></i>Settings
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-10">
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
                        <h6 class="text-muted mb-2">Total Revenue</h6>
                        <h2 class="fw-bold text-success" th:text="'$' + ${totalRevenue}">$0.00</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
                        <h6 class="text-muted mb-2">Total Orders</h6>
                        <h2 class="fw-bold text-primary" th:text="${totalOrders}">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
                        <h6 class="text-muted mb-2">Top Selling Product</h6>
                        <h2 class="fw-bold text-warning" th:if="${!#lists.isEmpty(topProducts)}" th:text="${topProducts[0].name}">Product</h2>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 mb-4">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="fw-bold mb-0">Sales Distribution</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Status</th>
                                    <th>Count</th>
                                    <th>Percentage</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="entry : ${orderStats}">
                                    <td th:text="${entry.key}">Status</td>
                                    <td th:text="${entry.value}">0</td>
                                    <td>
                                        <div class="progress" style="height: 10px;">
                                            <div class="progress-bar bg-success" th:style="'width: ' + (${entry.value} * 100 / ${totalOrders}) + '%'"></div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
