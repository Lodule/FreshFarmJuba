<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header}">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar}"></div>

<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg overflow-hidden mt-4" style="border-radius: 24px;">
                <div class="card-header bg-success text-white text-center py-5 border-0">
                    <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 80px; height: 80px;">
                        <i class="bi bi-person-check-fill text-success fs-1"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Welcome Back</h2>
                    <p class="text-white-50 mb-0">Sign in to your Fresh Farm account</p>
                </div>

                <div class="card-body p-4 p-md-5 bg-white">
                    <!-- Notifications -->
                    <div th:if="${param.error}" class="alert alert-danger border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <div class="d-flex">
                            <i class="bi bi-exclamation-circle-fill me-3 fs-4"></i>
                            <div>
                                <h6 class="fw-bold mb-1">Login Failed</h6>
                                <p class="small mb-0">Invalid email or password. Please try again.</p>
                            </div>
                        </div>
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <i class="bi bi-check-circle-fill me-2"></i>You've been logged out successfully.
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}">Success!</span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-success"></i></span>
                                <input type="email" name="email" class="form-control bg-light border-0"
                                       placeholder="your@email.com" required autofocus
                                       style="border-radius: 0 12px 12px 0 !important; padding: 0.8rem 1rem;">
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-end mb-2">
                                <label class="form-label small fw-bold text-uppercase text-muted mb-0">Password</label>
                                <a href="#" class="text-success small fw-bold text-decoration-none">Forgot?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-shield-lock text-success"></i></span>
                                <input type="password" name="password" class="form-control bg-light border-0"
                                       placeholder="••••••••" required
                                       style="border-radius: 0 12px 12px 0 !important; padding: 0.8rem 1rem;">
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                            <label class="form-check-label small text-muted" for="rememberMe">
                                Keep me signed in on this device
                            </label>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 py-3 rounded-pill fw-bold shadow-sm hover-up mb-4">
                            Sign In to Account
                        </button>

                        <div class="text-center">
                            <p class="text-muted mb-0">
                                New to Fresh Farm? <a th:href="@{/register}" class="text-success fw-bold text-decoration-none">Create an Account</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<style>
    .hover-up { transition: all 0.3s ease; }
    .hover-up:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
    .input-group-text { border-radius: 12px 0 0 12px !important; }
</style>

</body>
</html>
