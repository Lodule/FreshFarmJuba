<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header}">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar}"></div>

<div class="container py-5 mt-5">
    <div class="row mb-4">
        <div class="col-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-success text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item active">My Orders</li>
                </ol>
            </nav>
            <h2 class="fw-bold"><i class="bi bi-clock-history text-success me-2"></i>Order History</h2>
            <p class="text-muted">Manage and track your fresh farm orders</p>
        </div>
    </div>

    <div th:if="${orders.isEmpty()}" class="row justify-content-center py-5">
        <div class="col-md-6 text-center">
            <div class="bg-white p-5 rounded-4 shadow-sm">
                <div class="bg-light rounded-circle d-inline-flex p-4 mb-4">
                    <i class="bi bi-cart-x fs-1 text-muted"></i>
                </div>
                <h3>No orders yet</h3>
                <p class="text-muted mb-4">You haven't placed any orders with us yet. Start exploring our fresh products!</p>
                <a th:href="@{/products}" class="btn btn-success btn-lg rounded-pill px-4">
                    <i class="bi bi-shop me-2"></i>Explore Products
                </a>
            </div>
        </div>
    </div>

    <div th:if="${!orders.isEmpty()}" class="row g-4">
        <div th:each="order : ${orders}" class="col-12">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-3">
                <div class="card-header bg-white border-0 p-4">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <span class="text-muted small text-uppercase fw-bold d-block">Order Number</span>
                            <span class="fw-bold text-success" th:text="${order.orderNumber}">#FFJ-12345</span>
                        </div>
                        <div class="col-md-3">
                            <span class="text-muted small text-uppercase fw-bold d-block">Date Placed</span>
                            <span class="fw-bold" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, HH:mm')}">12 Mar 2024</span>
                        </div>
                        <div class="col-md-2">
                            <span class="text-muted small text-uppercase fw-bold d-block">Total Amount</span>
                            <span class="fw-bold" th:text="'$' + ${order.total}">$0.00</span>
                        </div>
                        <div class="col-md-2">
                            <span class="text-muted small text-uppercase fw-bold d-block">Status</span>
                            <span th:class="'badge rounded-pill px-3 py-2 ' +
                                  (${order.status.name() == 'DELIVERED' ? 'bg-success' :
                                    (order.status.name() == 'CANCELLED' ? 'bg-danger' :
                                    (order.status.name() == 'PROCESSING' ? 'bg-info' : 'bg-warning text-dark'))})"
                                  th:text="${order.status}">PENDING</span>
                        </div>
                        <div class="col-md-2 text-md-end">
                            <a th:href="@{/order/track(orderNumber=${order.orderNumber})}" class="btn btn-outline-success btn-sm rounded-pill px-3 fw-bold">
                                <i class="bi bi-geo-alt me-1"></i>Track Order
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card-body p-4 bg-light bg-opacity-50">
                    <div class="d-flex overflow-auto pb-2">
                        <div th:each="item : ${order.orderItems}" class="me-4 text-center" style="min-width: 80px;">
                            <img th:src="${item.productImage != null ? item.productImage : '/images/placeholder.jpg'}"
                                 class="rounded-3 shadow-sm mb-2" style="width: 70px; height: 70px; object-fit: cover;">
                            <p class="small fw-bold mb-0 text-truncate" style="max-width: 80px;" th:text="${item.productName}">Product</p>
                            <span class="badge bg-white text-dark border small" th:text="'x' + ${item.quantity}">x1</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 p-3 text-center">
                    <button class="btn btn-link text-success text-decoration-none small fw-bold">
                        View Order Details <i class="bi bi-chevron-down ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
