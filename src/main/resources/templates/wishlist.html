<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header}">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar}"></div>

<div class="container py-5 mt-5">
    <div class="row mb-4">
        <div class="col-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-success text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item active">My Wishlist</li>
                </ol>
            </nav>
            <h2 class="fw-bold"><i class="bi bi-heart-fill text-danger me-2"></i>My Wishlist</h2>
            <p class="text-muted">You have <span th:text="${wishlistItems.size()}" class="fw-bold text-dark">0</span> items in your wishlist</p>
        </div>
    </div>

    <div th:if="${wishlistItems.isEmpty()}" class="row justify-content-center py-5">
        <div class="col-md-6 text-center">
            <div class="bg-white p-5 rounded-4 shadow-sm">
                <i class="bi bi-heart fs-1 text-muted mb-3 d-block"></i>
                <h3>Your wishlist is empty</h3>
                <p class="text-muted mb-4">Save your favorite fresh products here and order them anytime!</p>
                <a th:href="@{/products}" class="btn btn-success btn-lg rounded-pill px-4">
                    <i class="bi bi-shop me-2"></i>Start Shopping
                </a>
            </div>
        </div>
    </div>

    <div th:if="${!wishlistItems.isEmpty()}" class="row g-4">
        <div th:each="item : ${wishlistItems}" class="col-md-6 col-lg-3">
            <div class="card border-0 shadow-sm h-100 rounded-4 overflow-hidden hover-lift">
                <div class="position-relative">
                    <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : '/images/placeholder.jpg'}"
                         class="card-img-top" style="height: 200px; object-fit: cover;" th:alt="${item.product.name}">
                    <div class="position-absolute top-0 end-0 p-2">
                        <form th:action="@{/wishlist/remove/{id}(id=${item.product.id})}" method="post">
                            <button type="submit" class="btn btn-light btn-sm rounded-circle shadow-sm text-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                    <span th:if="${item.product.organic}" class="position-absolute top-0 start-0 m-2 badge bg-success rounded-pill">Organic</span>
                </div>
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-light text-success fw-bold" th:text="${item.product.category}">Category</span>
                        <div class="text-warning small">
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${item.product.rating != null ? item.product.rating : '4.5'}">4.5</span>
                        </div>
                    </div>
                    <h5 class="card-title fw-bold mb-1" th:text="${item.product.name}">Product Name</h5>
                    <p class="text-muted small mb-3 text-truncate" th:text="${item.product.description}">Description</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fs-4 fw-bold text-success" th:text="'$' + ${item.product.price}">$0.00</span>
                            <small class="text-muted" th:text="'/' + ${item.product.unit}">/kg</small>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 p-4 pt-0">
                    <div class="d-grid gap-2">
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="productId" th:value="${item.product.id}">
                            <input type="hidden" name="quantity" value="1">
                            <button type="submit" class="btn btn-outline-success rounded-pill w-100 fw-bold">
                                <i class="bi bi-cart-plus me-2"></i>Add to Cart
                            </button>
                        </form>
                        <a th:href="@{/products/{id}(id=${item.product.id})}" class="btn btn-light rounded-pill w-100 fw-bold">View Details</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .hover-lift {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-lift:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
</style>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
